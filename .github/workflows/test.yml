name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot 4.3
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv /tmp/godot/Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot4
          sudo chmod +x /usr/local/bin/godot4

      - name: Import resources
        run: godot4 --headless --path . --import 2>&1 | tail -5 || true

      - uses: godot-gdunit-labs/gdUnit4-action@v1
        with:
          godot-version: '4.3'
          paths: 'res://tests'
          timeout: 300
